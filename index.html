<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<style>
:root {
  --bg: #0e1116;
  --panel: rgba(20, 26, 34, 0.75);
  --border: rgba(255,255,255,0.06);
  --text: #e8edf2;
  --muted: #8b98a7;
  --accent: #5aa9ff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Background */
.bg {
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(rgba(10,12,16,0.6), rgba(10,12,16,0.9)),
    url('background.png') center / cover no-repeat;
  filter: brightness(0.6);
}

/* Card */
.card {
  position: relative;
  width: min(700px, 92%);
  padding: 30px;
  border-radius: 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
}

/* Title */
h1 {
  margin: 0;
  font-size: 34px;
}

/* Subtext */
.subtitle {
  margin-top: 8px;
  color: var(--muted);
  font-size: 14px;
}

/* Progress */
.progress-wrap {
  margin-top: 30px;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 13px;
}

.progress {
  height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.2s ease;
}

/* Info */
.info {
  margin-top: 18px;
  font-size: 13px;
  color: var(--muted);
}

.status {
  margin-top: 14px;
  font-size: 14px;
}

/* Audio */
.audio {
  margin-top: 25px;
}

input[type="range"] {
  width: 100%;
}

.buttons {
  margin-top: 8px;
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #000;
  cursor: pointer;
}

button.secondary {
  background: rgba(255,255,255,0.1);
  color: var(--text);
}
</style>
</head>

<body>

<div class="bg"></div>

<audio id="music" loop>
  <source src="spooky-scary-skeletons.ogg" type="audio/ogg">
</audio>

<div class="card">

  <h1 id="servername">TTT Server</h1>
  <div class="subtitle">Verbindung wird aufgebaut…</div>

  <div class="progress-wrap">
    <div class="progress-top">
      <span id="statusText">Warte auf Daten…</span>
      <span id="percent">0%</span>
    </div>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
  </div>

  <div class="info">
    Map: <span id="map">-</span><br>
    Gamemode: <span id="mode">-</span><br>
    Datei: <span id="file">-</span><br>
    Fortschritt: <span id="files">0 / 0</span>
  </div>

  <div class="status" id="join">Initialisiere…</div>

  <div class="audio">
    <input type="range" id="volume" min="0" max="100" value="30">

    <div class="buttons">
      <button onclick="startMusic()">Play</button>
      <button class="secondary" onclick="toggleMute()">Mute</button>
    </div>
  </div>

</div>

<script>
const music = document.getElementById("music");
const volume = document.getElementById("volume");

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const statusText = document.getElementById("statusText");
const file = document.getElementById("file");
const files = document.getElementById("files");
const join = document.getElementById("join");

let total = 0;
let needed = 0;

/* Audio */
music.volume = volume.value / 100;

volume.oninput = () => {
  music.volume = volume.value / 100;
};

function startMusic() {
  music.play().catch(()=>{});
}

function toggleMute() {
  music.muted = !music.muted;
}

/* Progress */
function update() {
  if (total === 0) return;

  let done = total - needed;
  let p = (done / total) * 100;

  bar.style.width = p + "%";
  percent.textContent = Math.round(p) + "%";
  files.textContent = done + " / " + total;
}

/* GMod Hooks */
window.GameDetails = function(name, url, map, max, steamid, mode) {
  document.getElementById("servername").textContent = name;
  document.getElementById("map").textContent = map;
  document.getElementById("mode").textContent = mode;
};

window.SetFilesTotal = function(t) {
  total = t;
  needed = t;
  update();
};

window.SetFilesNeeded = function(n) {
  needed = n;
  update();
};

window.DownloadingFile = function(f) {
  file.textContent = f;
  statusText.textContent = "Lade Datei…";
};

window.SetStatusChanged = function(s) {
  join.textContent = s;
  statusText.textContent = s;
};
</script>

</body>
</html>
