<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<style>
:root {
  --text: #e8edf2;
  --muted: #9aa7b5;
  --accent: #5aa9ff;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, sans-serif;
  color: var(--text);
  overflow: hidden;
  background: #0b0f14;
}

.bg {
  position: fixed;
  inset: 0;
  background-image: url("./background.png");
  background-position: center center;
  background-repeat: no-repeat;
  background-size: cover;
  z-index: 0;
}

.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10,12,16,0.20) 0%,
    rgba(10,12,16,0.45) 55%,
    rgba(10,12,16,0.82) 100%
  );
  z-index: 1;
}

.top {
  position: fixed;
  top: 40px;
  left: 50px;
  z-index: 2;
}

.top h1 {
  margin: 0;
  font-size: 42px;
}

.top .sub {
  margin-top: 6px;
  color: var(--muted);
  font-size: 14px;
}

.bottom {
  position: fixed;
  left: 50px;
  right: 50px;
  bottom: 40px;
  z-index: 2;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 8px;
  font-size: 14px;
}

.progress {
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 999px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.2s ease;
}

.info {
  margin-top: 15px;
  font-size: 13px;
  color: var(--muted);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.status {
  margin-top: 10px;
  font-size: 14px;
}

.audio {
  position: fixed;
  right: 50px;
  bottom: 95px;
  width: 220px;
  z-index: 2;
}

.audio label {
  display: block;
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--muted);
}

input[type="range"] {
  width: 100%;
}

.buttons {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

button {
  flex: 1;
  padding: 8px 10px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
}

button:hover {
  background: rgba(255,255,255,0.22);
}

@media (max-width: 700px) {
  .top {
    top: 20px;
    left: 20px;
  }

  .bottom {
    left: 20px;
    right: 20px;
    bottom: 20px;
  }

  .audio {
    right: 20px;
    bottom: 110px;
    width: 180px;
  }

  .top h1 {
    font-size: 30px;
  }
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<audio id="music" loop preload="auto">
  <source src="./spooky-scary-skeletons.ogg" type="audio/ogg">
  Dein Browser unterstützt kein Audio.
</audio>

<div class="top">
  <h1 id="servername">TTT Server</h1>
  <div class="sub">Verbinde mit Server…</div>
</div>

<div class="bottom">
  <div class="progress-top">
    <span id="statusText">Initialisiere…</span>
    <span id="percent">0%</span>
  </div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="info">
    <span>Map: <b id="map">-</b></span>
    <span>Mode: <b id="mode">-</b></span>
    <span>Datei: <b id="file">-</b></span>
    <span><b id="files">0 / 0</b></span>
  </div>

  <div class="status" id="join">Warte auf Daten…</div>
</div>

<div class="audio">
  <label for="volume">Musiklautstärke</label>
  <input type="range" id="volume" min="0" max="100" value="30">
  <div class="buttons">
    <button type="button" onclick="startMusic()">Play</button>
    <button type="button" onclick="toggleMute()">Mute</button>
  </div>
</div>

<script>
const music = document.getElementById("music");
const volume = document.getElementById("volume");

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const statusText = document.getElementById("statusText");
const file = document.getElementById("file");
const files = document.getElementById("files");
const join = document.getElementById("join");

let total = 0;
let needed = 0;

music.volume = volume.value / 100;

volume.addEventListener("input", () => {
  music.volume = volume.value / 100;
});

function startMusic() {
  music.play().then(() => {
    console.log("Musik gestartet");
  }).catch((err) => {
    console.log("Audio konnte nicht gestartet werden:", err);
  });
}

function toggleMute() {
  music.muted = !music.muted;
}

function update() {
  if (total === 0) {
    bar.style.width = "0%";
    percent.textContent = "0%";
    files.textContent = "0 / 0";
    return;
  }

  const done = total - needed;
  const p = (done / total) * 100;

  bar.style.width = p + "%";
  percent.textContent = Math.round(p) + "%";
  files.textContent = done + " / " + total;
}

window.GameDetails = function(name, url, map, max, steamid, mode) {
  document.getElementById("servername").textContent = name || "TTT Server";
  document.getElementById("map").textContent = map || "-";
  document.getElementById("mode").textContent = mode || "-";
};

window.SetFilesTotal = function(t) {
  total = Number(t) || 0;
  needed = total;
  update();
};

window.SetFilesNeeded = function(n) {
  needed = Number(n) || 0;
  update();
};

window.DownloadingFile = function(f) {
  file.textContent = f || "-";
  statusText.textContent = "Lade Datei…";
};

window.SetStatusChanged = function(s) {
  join.textContent = s || "Ladevorgang läuft…";
  statusText.textContent = s || "Ladevorgang läuft…";
};

/* Browser-Test:
   Klick irgendwo auf die Seite, um Musik testweise zu starten */
document.addEventListener("click", () => {
  if (music.paused) {
    music.play().catch(() => {});
  }
}, { once: true });
</script>

</body>
</html>
