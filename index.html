<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<style>
:root {
  --text: #e8edf2;
  --muted: #9aa7b5;
  --accent: #5aa9ff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  font-family: Arial, sans-serif;
  color: var(--text);
  overflow: hidden;
}

/* BACKGROUND */
.bg {
  position: absolute;
  inset: 0;
  background: url('background.png') center / cover no-repeat;
  transform: scale(1.02);
}

/* DUNKLES OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(10,12,16,0.3) 0%,
    rgba(10,12,16,0.6) 60%,
    rgba(10,12,16,0.9) 100%
  );
}

/* TOP BAR */
.top {
  position: absolute;
  top: 40px;
  left: 50px;
}

.top h1 {
  margin: 0;
  font-size: 42px;
}

.top .sub {
  margin-top: 6px;
  color: var(--muted);
  font-size: 14px;
}

/* BOTTOM UI */
.bottom {
  position: absolute;
  bottom: 40px;
  left: 50px;
  right: 50px;
}

/* PROGRESS */
.progress-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 14px;
}

.progress {
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 999px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.2s ease;
}

/* INFO */
.info {
  margin-top: 15px;
  font-size: 13px;
  color: var(--muted);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

/* AUDIO */
.audio {
  position: absolute;
  bottom: 40px;
  right: 50px;
  width: 200px;
}

input[type="range"] {
  width: 100%;
}

button {
  margin-top: 6px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<audio id="music" loop>
  <source src="spooky-scary-skeletons.ogg" type="audio/ogg">
</audio>

<!-- TOP -->
<div class="top">
  <h1 id="servername">TTT Server</h1>
  <div class="sub">Verbinde mit Server…</div>
</div>

<!-- BOTTOM -->
<div class="bottom">

  <div class="progress-top">
    <span id="statusText">Initialisiere…</span>
    <span id="percent">0%</span>
  </div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <div class="info">
    <span>Map: <b id="map">-</b></span>
    <span>Mode: <b id="mode">-</b></span>
    <span>Datei: <b id="file">-</b></span>
    <span><b id="files">0 / 0</b></span>
  </div>

  <div class="status" id="join">Warte auf Daten…</div>

</div>

<!-- AUDIO CONTROL -->
<div class="audio">
  <input type="range" id="volume" min="0" max="100" value="30">
  <button onclick="startMusic()">Play</button>
  <button onclick="toggleMute()">Mute</button>
</div>

<script>
const music = document.getElementById("music");
const volume = document.getElementById("volume");

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const statusText = document.getElementById("statusText");
const file = document.getElementById("file");
const files = document.getElementById("files");
const join = document.getElementById("join");

let total = 0;
let needed = 0;

/* AUDIO */
music.volume = volume.value / 100;

volume.oninput = () => {
  music.volume = volume.value / 100;
};

function startMusic() {
  music.play().catch(()=>{});
}

function toggleMute() {
  music.muted = !music.muted;
}

/* PROGRESS */
function update() {
  if (total === 0) return;

  let done = total - needed;
  let p = (done / total) * 100;

  bar.style.width = p + "%";
  percent.textContent = Math.round(p) + "%";
  files.textContent = done + " / " + total;
}

/* GMod Hooks */
window.GameDetails = function(name, url, map, max, steamid, mode) {
  document.getElementById("servername").textContent = name;
  document.getElementById("map").textContent = map;
  document.getElementById("mode").textContent = mode;
};

window.SetFilesTotal = function(t) {
  total = t;
  needed = t;
  update();
};

window.SetFilesNeeded = function(n) {
  needed = n;
  update();
};

window.DownloadingFile = function(f) {
  file.textContent = f;
  statusText.textContent = "Lade Datei…";
};

window.SetStatusChanged = function(s) {
  join.textContent = s;
  statusText.textContent = s;
};
</script>

</body>
</html>
