<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTT Loading Screen</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #111;
    }

    .box {
      background: rgba(0,0,0,0.65);
      padding: 30px;
      border-radius: 14px;
      max-width: 700px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    .links a {
      color: #fff;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    .rules {
      margin-top: 20px;
      text-align: left;
    }
    
    .volume-control {
      margin-top: 20px;
      text-align: left;
    }

    .volume-control label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .volume-control input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>
  
  <audio id="bgmusic" autoplay loop>
    <source src="musik.ogg" type="audio/ogg">
  </audio>
  
  <div class="box">
    <h1>Willkommen auf Mabinos TTT Server</h1>
    <p>Assets werden geladen. Bitte einen Moment Geduld.</p>

    <div class="links">
      <a href="https://discord.gg/deinlink" target="_blank">Discord</a>
      <a href="https://steamcommunity.com/sharedfiles/filedetails/?id=DEINEKOLLEKTIONSID" target="_blank">Workshop</a>
    </div>

    <div class="rules">
      <h2>Regeln</h2>
      <p>1. Kein RDM<br>
         2. Kein Ghosting<br>
         3. Respektvoll bleiben</p>
    </div>

    <div class="volume-control">
      <label for="volume">Musiklautstärke</label>
      <input type="range" id="volume" min="0" max="100" value="30">
      <button id="muteBtn">Mute</button>
    </div>
    
  </div>

<script>
  const music = document.getElementById("bgmusic");
  const volumeSlider = document.getElementById("volume");
  const muteBtn = document.getElementById("muteBtn");

  music.volume = volumeSlider.value / 100;

  volumeSlider.addEventListener("input", function () {
    music.volume = this.value / 100;
  });

  muteBtn.addEventListener("click", function () {
    music.muted = !music.muted;
    muteBtn.textContent = music.muted ? "Unmute" : "Mute";
  });
</script>
  
</body>
</html>
